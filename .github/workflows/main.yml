name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Hoặc branch bạn muốn chạy action

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Thay 'your-docker-username' bằng username thật của bạn trên Docker Hub
          username: letoanban 
          # GITHUBACTIONSECRET hiện tại đang chứa Personal Access Token của bạn
          password: ${{ secrets.GITHUBACTIONSECRET }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Thay 'your-docker-username/repository-name' cho đúng project của bạn
          tags: your-docker-username/repository-name:latest
          # Sử dụng cache để build nhanh hơn ở các lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max
